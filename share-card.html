<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>仙途 · 修仙之旅</title>
<meta property="og:title" content="仙途 · 修仙之旅">
<meta property="og:description" content="免费修仙游戏，灵感源自凡人修仙传">
<meta property="og:image" content="https://mizeyi.github.io/xiuxian-game/game-assets/npc-cave.webp">
<meta property="og:url" content="https://mizeyi.github.io/xiuxian-game/xiuxian.html">
<meta name="description" content="免费修仙游戏——修炼渡劫、炼丹秘境、功法传承、道侣双修、竞技对决。浏览器即开即玩，灵感源自凡人修仙传。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;background:#120825;color:#e0d0b0;line-height:1.6}
.container{max-width:480px;margin:0 auto;padding:0}
/* 卡片 */
.card{border-radius:0;overflow:hidden;min-height:100vh}
/* 仙侠背景 */
.hero{height:420px;background:linear-gradient(180deg,#0a0618 0%,#1a1035 25%,#301840 50%,#582040 75%,#a06020 100%);position:relative;overflow:hidden}
.sun{position:absolute;top:200px;left:50%;transform:translateX(-50%);width:160px;height:160px;background:radial-gradient(circle,#fff8e0,#ffe0a0 15%,#ffb040 40%,#e07020 70%,transparent);border-radius:50%;box-shadow:0 0 100px rgba(255,170,50,.6)}
.mt{position:absolute;bottom:-20px;width:100%;height:200px;background:linear-gradient(180deg,transparent,#0a0420 25%,#1a0a35 55%,#120825 100%);border-radius:50% 50% 0 0 / 30% 30% 0 0;transform:scaleX(1.3)}
.cv{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);width:48px;height:110px;background:linear-gradient(180deg,rgba(30,15,50,.85),rgba(50,30,70,.85),rgba(30,15,50,.9));clip-path:polygon(50% 0,68% 10%,75% 20%,82% 40%,85% 60%,80% 70%,65% 65%,55% 55%,50% 80%,45% 55%,35% 65%,20% 70%,15% 60%,18% 40%,25% 20%,32% 10%)}
.aura{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(255,200,80,.15),rgba(180,130,255,.08),transparent 70%);animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.15)}}
.p{position:absolute;width:3px;height:3px;background:#ffd080;border-radius:50%;box-shadow:0 0 5px #ffa040;animation:fl 3s ease-in-out infinite}
.p1{left:80px;top:300px;animation-delay:0s}.p2{left:220px;top:260px;animation-delay:.8s}.p3{left:150px;top:340px;animation-delay:1.6s}
@keyframes fl{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(-18px);opacity:.3}}
.title-box{position:absolute;top:30px;width:100%;text-align:center;z-index:2}
.title{font-size:56px;background:linear-gradient(180deg,#ffe8a0,#ffd060,#e0a020,#ffd060,#ffe8a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:16px;text-shadow:none;font-weight:900}
.sub{font-size:14px;color:#e0c080;letter-spacing:5px;margin-top:4px}
/* 内容区 */
.content{background:#120825;padding:24px 20px 30px}
.content h2{font-size:20px;color:#ffd060;text-align:center;margin-bottom:16px}
.tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.tag{font-size:13px;padding:6px 14px;background:rgba(255,200,100,.08);border:1px solid rgba(255,200,100,.2);border-radius:20px;color:#e0c080}
.intro{font-size:14px;color:#b0a0c0;text-align:center;line-height:2;margin-bottom:20px}
.intro span{color:#ffd080;font-weight:600}
/* 按钮 */
.btn-box{text-align:center;margin:20px 0 24px}
.btn-play{display:inline-block;padding:14px 48px;background:linear-gradient(135deg,#a06020,#d09040,#a06020);color:#fff;font-size:18px;font-weight:700;border-radius:30px;text-decoration:none;letter-spacing:3px;box-shadow:0 6px 24px rgba(200,120,40,.4);transition:transform .2s}
.btn-play:active{transform:scale(.96)}
.url-hint{text-align:center;font-size:12px;color:#605070;margin-top:8px}
.url-hint code{background:rgba(255,255,255,.05);padding:3px 8px;border-radius:4px;font-size:11px;word-break:break-all;color:#706090}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,200,100,.15),transparent);margin:20px 0}
.tip{font-size:12px;color:#504060;text-align:center}
</style>
</head>
<body>
<div class="container">
<div class="card">
  <div class="hero">
    <div class="sun"></div>
    <div class="p p1"></div><div class="p p2"></div><div class="p p3"></div>
    <div class="cv"></div>
    <div class="aura"></div>
    <div class="mt"></div>
    <div class="title-box">
      <div class="title">仙 途</div>
      <div class="sub">修仙之旅</div>
    </div>
  </div>

  <div class="content">
    <h2>🏮 浏览器即开即玩 🏮</h2>
    <div class="tags">
      <span class="tag">修炼渡劫</span>
      <span class="tag">炼丹秘境</span>
      <span class="tag">功法传承</span>
      <span class="tag">仙府建造</span>
      <span class="tag">道侣双修</span>
      <span class="tag">竞技对决</span>
    </div>
    <div class="intro">
      灵感源自 <span>《凡人修仙传》</span><br>
      8大境界 · 10种功法 · 天地玄黄<br>
      神识遁速 · 灵根资质 · 天材地宝<br>
      自动存档 · 手机 / 电脑皆可
    </div>

    <div class="btn-box">
      <a class="btn-play" href="https://mizeyi.github.io/xiuxian-game/xiuxian.html" target="_self">🎮 开始修仙</a>
    </div>

    <div class="divider"></div>

    <div class="url-hint">
      如按钮无法跳转，复制链接到浏览器：<br>
      <code>https://mizeyi.github.io/xiuxian-game/xiuxian.html</code>
    </div>

    <div class="divider"></div>
    <div class="tip">💾 进度自动保存在浏览器中</div>
  </div>
</div>
</div>
</body>
</html>
