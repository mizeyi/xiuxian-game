<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>仙途 · 凡人修仙传</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#1a1e32;font-family:"Noto Serif SC","KaiTi",serif;}
body{display:flex;justify-content:center;align-items:center;padding:0.3rem;color:#f0e8d5;}
.game-container{
    width:100%;max-width:520px;height:100%;background:linear-gradient(180deg,rgba(22,20,42,0.97),rgba(30,26,55,0.95));
    border:1px solid #8a6d3b;border-radius:1rem;padding:0.5rem;display:flex;flex-direction:column;gap:0.4rem;
    box-shadow:0 0 40px rgba(160,120,60,0.2),0 0 80px rgba(0,0,0,0.4),inset 0 0 60px rgba(80,60,30,0.08);overflow:hidden;
}
@keyframes btFlash{0%{box-shadow:0 0 20px gold,inset 0 0 20px gold}50%{box-shadow:0 0 80px orange,inset 0 0 80px orange}100%{box-shadow:0 0 0px gold,inset 0 0 0px gold}}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes spk{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes sldIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bt-glow{animation:btFlash 1.5s ease-out;}
.header{text-align:center;font-size:1.3rem;font-weight:bold;color:#ffe8a0;animation:flt 3s infinite;}
.pname{text-align:center;font-size:0.9rem;color:#fff;}
.stats{
    background:#2d2840;border-radius:0.8rem;padding:0.4rem 0.5rem;border:1px solid #7a6548;
    font-size:0.7rem;display:grid;grid-template-columns:repeat(3,1fr);gap:0.15rem 0.3rem;
}
.si{display:flex;align-items:center;gap:0.15rem;white-space:nowrap;}
.si span:last-child{color:#ffe8a0;font-weight:bold;}
.sbar{grid-column:1/-1;display:flex;align-items:center;gap:0.3rem;margin-top:0.05rem;}
.sbl{font-size:0.6rem;color:#c7b58a;white-space:nowrap;min-width:24px;}
.sbf{flex:1;height:5px;background:#3a3440;border-radius:10px;overflow:hidden;}
.sbi{height:100%;background:linear-gradient(90deg,#e0c060,#f9e8a0);width:0;transition:width 0.3s;}
.sbt{font-size:0.6rem;color:#ffe8a0;white-space:nowrap;}
.scene-b{display:flex;background:#2d2840;border-radius:0.8rem;padding:0.1rem;border:1px solid #8a7558;flex-shrink:0;flex-wrap:wrap;}
.scn{background:transparent;border:none;color:#c7b58a;padding:0.35rem 0.15rem;border-radius:0.7rem;
    font-weight:bold;font-size:0.68rem;flex:1;min-width:38px;text-align:center;cursor:pointer;touch-action:manipulation;transition:all 0.2s;}
.scn.active{background:#5a4a35;color:#ffe8a0;box-shadow:0 0 10px rgba(220,190,80,0.4);}
.pnl{background:#252838;border-radius:0.8rem;padding:0.6rem;border:1px solid #8a7558;
    display:none;flex-direction:column;gap:0.4rem;flex:1;min-height:0;overflow-y:auto;animation:sldIn 0.3s;}
.pnl.active{display:flex;}
.btn{
    background:#3d3455;border:1px solid #9a8560;color:#f8ecd0;padding:0.45rem 0.55rem;
    border-radius:0.9rem;font-weight:bold;font-size:0.72rem;cursor:pointer;text-align:center;touch-action:manipulation;
    transition:all 0.15s;white-space:nowrap;user-select:none;
}
.btn:active{background:#5a4d40;border-color:#d4c080;transform:scale(0.96);}
.btn.pr{background:#7a6040;border-color:#e8c060;}
.btn.dg{border-color:#c86060;color:#ffc8b8;}
.btn.gd{background:#7a6028;border-color:#ffe080;color:#ffe8a0;}
.btn:disabled{opacity:0.5;pointer-events:none;}
.bs{font-size:0.65rem;padding:0.3rem 0.5rem;}
.card{
    background:#2e2838;border-radius:0.7rem;padding:0.4rem 0.5rem;border:1px solid #9a7850;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.3rem;font-size:0.72rem;
}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:0.3rem;}
.logbox{
    background:#1c2030;border-radius:0.6rem;padding:0.4rem;height:70px;flex-shrink:0;
    overflow-y:auto;font-size:0.65rem;color:#c8b890;border:1px solid #6a5840;line-height:1.35;
}
.evpnl{
    background:#342e48;border-radius:0.6rem;padding:0.5rem;border:1px solid #c8a860;
    display:none;font-size:0.72rem;animation:sldIn 0.2s;
}
.evopts{display:flex;gap:0.3rem;justify-content:center;margin-top:0.3rem;flex-wrap:wrap;}
.ovl{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:9999;}
.mbox{background:#2a2540;border:2px solid #d4b868;border-radius:1rem;padding:1rem;text-align:center;min-width:260px;max-width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 0 30px rgba(200,160,80,0.2);}
.mbox h3{color:#ffe8a0;font-size:0.95rem;margin-bottom:0.5rem;}
.mbox input{padding:0.4rem;border-radius:0.8rem;border:1px solid #c7a55b;background:#383050;color:#ffe8a0;font-size:0.85rem;text-align:center;width:80%;margin:0.3rem 0;}
.gopt{font-size:1rem;cursor:pointer;padding:0.3rem 0.7rem;border-radius:0.8rem;border:2px solid transparent;display:inline-block;margin:0 0.3rem;transition:all 0.2s;user-select:none;}
.gopt.sel{border-color:#ffd700;background:rgba(255,215,0,0.2);}
.dfl{text-align:center;font-size:0.9rem;color:#ff9000;margin:0.3rem 0;}
.bname{color:#ff4444;font-size:1rem;animation:spk 1s infinite;}
.skill-bar{display:flex;flex-wrap:wrap;gap:0.3rem;margin:0.3rem 0;}
.build-card{background:#283040;border:1px solid #7a7a9a;border-radius:0.6rem;padding:0.4rem;font-size:0.7rem;display:flex;justify-content:space-between;align-items:center;}
.ach-card{background:#283a18;border:1px solid #7aa84a;border-radius:0.6rem;padding:0.3rem 0.5rem;font-size:0.68rem;display:flex;justify-content:space-between;align-items:center;}
.ach-card.locked{opacity:0.5;}

/* ===== 场景氛围背景（含CG图片） ===== */
.scene-portrait{
    width:100%;height:110px;border-radius:0.6rem;
    border:1px solid rgba(200,170,100,0.3);
    background-size:cover;background-position:center;background-repeat:no-repeat;
}
.scene-cave{background-image:url('game-assets/bg-cave.webp');}
.scene-estate{background-image:url('game-assets/bg-estate.webp');}
.scene-sect{background-image:url('game-assets/bg-sect.webp');}
.scene-wild{background-image:url('game-assets/bg-wild.webp');}
.scene-market{background-image:url('game-assets/bg-market.webp');}
.scene-dungeon{background-image:url('game-assets/bg-dungeon.webp');}
.scene-secret{background-image:url('game-assets/bg-secret.webp');}
.scene-arena{background-image:url('game-assets/bg-arena.webp');}
.scene-portrait::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(to bottom,rgba(20,20,40,0.15) 0%,rgba(20,20,40,0.35) 100%);
    pointer-events:none;
}
.sp-inner{
    font-size:1.2rem;text-align:center;z-index:1;text-shadow:0 0 12px rgba(0,0,0,0.5),0 0 3px rgba(255,220,150,0.3);
    color:#ffe8a0;letter-spacing:0.1rem;position:relative;
}
/* 角色头像 */
.avatar-box{
    width:44px;height:44px;border-radius:50%;border:2px solid #c7a55b;
    flex-shrink:0;overflow:hidden;
    background-size:cover;background-position:center top;
    box-shadow:0 0 10px rgba(200,170,100,0.4);
}
.avatar-box.male{background-image:url('game-assets/hero-male.webp');border-color:#6a9fcf;box-shadow:0 0 10px rgba(100,150,220,0.4);}
.avatar-box.female{background-image:url('game-assets/hero-female.webp');border-color:#cf6a9a;box-shadow:0 0 10px rgba(220,130,180,0.4);}
/* Boss插图 */
.boss-img{width:100%;height:120px;border-radius:0.6rem;background-size:cover;background-position:center;margin:0.3rem 0;border:1px solid rgba(200,60,60,0.4);}
.boss-dragon{background-image:url('game-assets/boss-dragon.webp');}
.boss-fox{background-image:url('game-assets/boss-fox.webp');}
.boss-spirit{background-image:url('game-assets/boss-spirit.webp');}
/* NPC立绘 - 全宽展示 */
.npc-portrait{
    width:100%;border-radius:0.7rem;margin:0.2rem 0;border:1px solid rgba(200,170,100,0.4);
    box-shadow:0 0 15px rgba(200,160,80,0.15);overflow:hidden;flex-shrink:0;
}
.npc-img{width:100%;display:block;border-radius:0.7rem;}
/* 移动端适配 */
@media(max-width:480px){
    .scene-portrait{height:80px;}
    .boss-img{height:100px;background-size:contain;background-repeat:no-repeat;}
    .avatar-box{width:38px;height:38px;}
    .partner-box{width:46px;height:46px;}
}
/* 道侣头像 */
.partner-box{
    width:54px;height:54px;border-radius:50%;border:2px solid #e8a0c0;
    background-image:url('game-assets/partner.webp');
    background-size:cover;background-position:center;flex-shrink:0;
    box-shadow:0 0 12px rgba(220,150,180,0.4);
}
/* 场景标题装饰 */
.scene-header-bar{
    display:flex;align-items:center;gap:0.4rem;padding:0.2rem 0;
}
.scene-icon{font-size:1.4rem;}
/* 保存提示 */
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-60px);
    background:rgba(40,35,60,0.95);color:#ffe8a0;padding:0.5rem 1.2rem;border-radius:0.5rem;
    border:1px solid rgba(200,170,100,0.5);z-index:9999;font-size:0.8rem;
    transition:transform 0.3s,opacity 0.3s;opacity:0;pointer-events:none;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
/* 快捷操作栏 */
.quick-bar{
    display:flex;gap:0.3rem;padding:0.2rem 0;flex-shrink:0;justify-content:center;
}
/* ===== 突破/渡劫炫酷动画 ===== */
.trib-overlay{position:fixed;inset:0;z-index:9998;display:none;
    background:radial-gradient(ellipse at center,rgba(10,5,30,0.92),rgba(0,0,0,0.97));
    align-items:center;justify-content:center;flex-direction:column;overflow:hidden;}
.trib-overlay.show{display:flex;animation:tribFadeIn 0.3s ease;}
@keyframes tribFadeIn{from{opacity:0;}to{opacity:1;}}
/* 雷云 */
.trib-cloud{position:absolute;top:-10%;left:50%;transform:translateX(-50%);
    width:280px;height:120px;
    background:radial-gradient(ellipse at center,rgba(60,40,100,0.9),rgba(20,10,40,0.4) 60%,transparent);
    border-radius:50%;filter:blur(8px);
    animation:tribCloud 0.6s ease-out forwards;}
@keyframes tribCloud{from{top:-20%;opacity:0;}to{top:5%;opacity:1;}}
/* 闪电 */
.trib-bolt{position:absolute;top:8%;left:50%;width:3px;height:0;
    background:linear-gradient(to bottom,transparent,#fff,#a0d0ff,#fff,transparent);
    box-shadow:0 0 20px #a0d0ff,0 0 40px #6090ff;
    transform:translateX(-50%);
    animation:tribBolt 0.15s ease-out forwards;}
@keyframes tribBolt{0%{height:0;}50%{height:60vh;opacity:1;}100%{height:60vh;opacity:0.3;}}
/* 金光爆发 */
.trib-burst{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
    width:0;height:0;border-radius:50%;
    background:radial-gradient(circle,rgba(255,240,180,0.95),rgba(255,200,80,0.6) 30%,rgba(255,160,40,0.2) 60%,transparent);
    animation:tribBurst 1.2s ease-out forwards;}
@keyframes tribBurst{0%{width:0;height:0;opacity:0;}20%{opacity:1;}100%{width:120vw;height:120vw;opacity:0;}}
/* 粒子环 */
.trib-ring{position:absolute;top:40%;left:50%;width:0;height:0;
    border:3px solid rgba(255,220,120,0.8);border-radius:50%;
    transform:translate(-50%,-50%);
    animation:tribRing 1s ease-out forwards;}
@keyframes tribRing{0%{width:0;height:0;opacity:1;border-width:4px;}100%{width:80vw;height:80vw;opacity:0;border-width:1px;}}
/* 大字 */
.trib-text{position:relative;z-index:2;font-size:2.2rem;font-weight:bold;
    letter-spacing:0.2rem;text-align:center;
    animation:tribTextIn 0.5s ease-out 0.3s both;}
.trib-text.success{color:#ffe8a0;text-shadow:0 0 20px rgba(255,200,80,0.8),0 0 40px rgba(255,160,40,0.5),0 0 8px rgba(255,240,180,0.6);}
.trib-text.fail{color:#ff6060;text-shadow:0 0 20px rgba(255,60,60,0.8),0 0 40px rgba(200,20,20,0.4);}
@keyframes tribTextIn{from{transform:scale(0.3);opacity:0;}to{transform:scale(1);opacity:1;}}
.trib-sub{font-size:0.9rem;color:#c0b0d0;margin-top:0.5rem;letter-spacing:0.1rem;
    animation:tribTextIn 0.5s ease-out 0.8s both;}
/* 飞升碎片 */
.trib-spark{position:absolute;width:4px;height:4px;border-radius:50%;
    background:#ffe8a0;box-shadow:0 0 6px #ffd060;pointer-events:none;}
@keyframes tribSpark{
    0%{transform:scale(0) translateY(0);opacity:0;}
    30%{transform:scale(1.5) translateY(-20px);opacity:1;}
    100%{transform:scale(0.5) translateY(60px);opacity:0;}
}
</style>
</head>
<body>
<div class="game-container" id="gc">
<div class="header" id="realm">炼气期·前期</div>
<div class="pname" id="pname">无名修士</div>
<div class="stats" id="stats"></div>
<div class="quick-bar">
    <button class="btn bs pr" onclick="G.quickSp();G.save();" title="回满灵力(20灵石)">💠回满灵力</button>
    <button class="btn bs" onclick="G.quickHeal();G.save();" title="回满生命(15灵石)">💚回满生命</button>
    <button class="btn bs" onclick="G.quickMed();G.save();" title="调息回复(5灵石)">🌿调息</button>
</div>
<div class="scene-portrait scene-cave" id="scenePortrait"><div class="sp-inner">🏔️ 洞府修炼</div></div>
<div class="scene-b">
    <button class="scn active" onclick="G.switchScene('cave')">洞府</button>
    <button class="scn" onclick="G.switchScene('estate')">仙府</button>
    <button class="scn" onclick="G.switchScene('sect')">宗门</button>
    <button class="scn" onclick="G.switchScene('wild')">野外</button>
    <button class="scn" onclick="G.switchScene('market')">坊市</button>
    <button class="scn" onclick="G.switchScene('dungeon')">副本</button>
    <button class="scn" onclick="G.switchScene('secret')">秘境</button>
    <button class="scn" onclick="G.switchScene('arena')">竞技</button>
</div>
<div class="pnl active" id="pnlCave"></div>
<div class="pnl" id="pnlEstate"></div>
<div class="pnl" id="pnlSect"></div>
<div class="pnl" id="pnlWild"></div>
<div class="pnl" id="pnlMarket"></div>
<div class="pnl" id="pnlDungeon"></div>
<div class="pnl" id="pnlSecret"></div>
<div class="pnl" id="pnlArena"></div>
<div class="evpnl" id="evpnl"><div id="evdesc"></div><div class="evopts" id="evopts"></div></div>
<div class="logbox" id="logbox">> 踏入仙途...</div>
<div style="display:flex;justify-content:space-between;flex-shrink:0;gap:0.3rem;">
    <button class="btn bs" onclick="G.showAch()">成就</button>
    <button class="btn bs" onclick="G.showDaily()">日常</button>
    <button class="btn bs" onclick="G.manualSave()">保存</button>
    <button class="btn bs" onclick="G.manualLoad()">读档</button>
    <button class="btn bs dg" onclick="G.resetGame()">重修</button>
</div>
</div>
<div id="modalC"></div>
<div class="toast" id="toast">已保存</div>
<div class="trib-overlay" id="tribOverlay"></div>

<script>
var G = {
    SAVE_KEY: 'xiuxian_v23',
    MANUAL_KEY: 'xiuxian_v23_manual',
    
    REALMS: [
        {name:"炼气期",atkMul:2,spiritMax:100,lifeBonus:20,hpBase:80,subCost:[60,100]},

    SECRET_REALMS: [
        {name:"炼气秘境",minR:0,cost:10,ss:35,cv:6},

    },
    PILLS: [

        {id:"spiritElix",name:"化神丹",desc:"突破率+",realmLvl:4,rwd:15,cost:1800,mat:10},
        {id:"tribElix",name:"渡劫丹",desc:"突破率+",realmLvl:5,rwd:10,cost:4000,mat:12},
    ],

    recalc: function(){
        var s=this.s, rm=this.REALMS[s.r], eq=s.eq;
        var atk=10+Math.floor(rm.atkMul*(1+s.sr*0.25));
        if(s.amb) atk+=s.amb;
        if(s.par) atk+=s.par.ab||0;
        var df=0;
        if(eq.wp){atk+=(eq.wp.atk||0)+s.r*2;df+=eq.wp.def||0;}
        if(eq.ar){atk+=eq.ar.atk||0;df+=(eq.ar.def||0)+s.r;}
        (eq.rg||[]).forEach(function(a){if(a){atk+=a.atk||0;df+=a.def||0;}});
        s.ba=Math.floor(Math.max(1,atk));
        s.df=Math.floor(df);
        // 功法加成
        if(s.tech){
            if(s.tech.atk) s.ba=Math.floor(s.ba*s.tech.atk);
            if(s.tech.def) s.df=Math.floor(s.df*(1+s.tech.def));
            if(s.tech.hpMul) s.mhp=Math.floor(s.mhp*s.tech.hpMul);
        }
        // 神识影响炼丹品质 & 探索
        // 遁速影响云游效率（在rove等函数中使用）
        s.msp=rm.spiritMax+s.r*5;
        if(rm.lifeBonus>5000) s.mag=1e99;
        else s.mag=80+rm.lifeBonus+(s.lfb||0)-(s.agr||0);
        s.mhp=Math.floor(rm.hpBase*(1+s.sr*0.12));
        (eq.rg||[]).forEach(function(a){if(a&&a.hp)s.mhp+=a.hp;});
        if(eq.ar&&eq.ar.hp) s.mhp+=eq.ar.hp;
        if(s.pet) s.mhp+=s.pet.evo? s.pet.evoHp:s.pet.hp;
        if(s.tech&&s.tech.hpMul) s.mhp=Math.floor(s.mhp*s.tech.hpMul);
        if(!isFinite(s.mhp)||s.mhp<=0) s.mhp=80;
        if(s.sp>s.msp) s.sp=s.msp;
        if(s.hp>s.mhp) s.hp=s.mhp;
        if(!isFinite(s.ag)||s.ag<0) s.ag=20;
        if(!isFinite(s.mag)||s.mag<=0) s.mag=100;
        if(s.ag>s.mag) s.ag=s.mag;
    },

    subCost: function(){var s=this.s;return s.sr>=2?1e99:this.REALMS[s.r].subCost[s.sr];},
    brNeed: function(){return Math.floor(this.REALMS[this.s.r].subCost[1]*1.5);},
    maxCv: function(){return this.s.sr<2?this.subCost():this.brNeed();},
    brRate: function(){return Math.min(100,(this.s.bbr||0)+(this.s.bbrb||0));},
    agePen: function(){return Math.max(0.3,1-(this.s.ag-20)*0.006);},
    cvMul: function(){
        var m=this.ROOTS[this.s.rt].mult; // 灵根倍率直接决定修炼速度
        if(this.s.par) m+=this.s.par.sb||0;
        if(this.s.tech) m+=this.s.tech.cv||0; // 功法加成
        m*=this.agePen();
        if(this.s.es.sa>0) m+=this.s.es.sa*0.1;
        if(this.s.es.tr>0) m+=this.s.es.tr*0.05;
        return Math.max(0.15,m);
    },
    cvGain: function(){return Math.floor((4+this.s.r*2.5)*(0.8+Math.random()*0.4)*this.cvMul());},

    log: function(msg){
        var s=this.s; s.logs.push(msg);
        if(s.logs.length>20) s.logs.shift();
        this.refresh();
    },

    cy: function(y){
        var s=this.s;
        if(s.r===6){s.ftl=Math.max(0,s.ftl-y);if(s.ftl<=0){this.log("飞升时限已至，轮回重修。");this.resetGame(true);return false;}return true;}
        s.ag+=y;if(s.ag>=s.mag){this.log("寿元耗尽，轮回重修。");this.resetGame(true);return false;}return true;
    },
    rma: function(y){
        var s=this.s;
        if(s.r>=6){s.ftl=Math.max(0,s.ftl-y);if(s.ftl<=0){this.log("飞升时限耗尽，轮回重修。");this.resetGame(true);}return;}
        if(!isFinite(s.mag)) return;
        s.agr=(s.agr||0)+y;
        s.mag=Math.max(s.ag,s.mag-y);
        if(s.ag>=s.mag){this.log("寿元枯竭，轮回重修。");this.resetGame(true);}
    },
    hpDeath: function(){
        this.log("重伤昏迷！修为-10%，寿元-5");
        this.s.cv=Math.floor(this.s.cv*0.9);
        this.rma(5);
        this.s.hp=this.s.mhp;

    checkAch: function(){
        var s=this.s, changed=false;
        this.ACHS.forEach(function(a){
            if(!s.achs[a.id]&&a.ck(s)){
                s.achs[a.id]=true;
                if(a.rwd>0){s.ss+=a.rwd;G.log("成就解锁："+a.name+"！灵石+"+a.rwd);}
                else G.log("成就解锁："+a.name);
                changed=true;
            }
        });
        if(changed) this.refresh();
    },

        if(t&&!t.done){t.prog++;if(t.prog>=t.need){t.done=true;this.s.ss+=t.rwd;this.log("日常完成："+t.desc+"，灵石+"+t.rwd);}}
    },

    learnSkill: function(sid){
        if(this.s.skls.indexOf(sid)>=0){this.log("已学会此技能");return;}
        this.s.skls.push(sid);this.s.scds[sid]=0;
        var nm=this.SKILLS.filter(function(s){return s.id===sid;})[0].name;
        this.log("学会技能【"+nm+"】");
        this.checkAch();
    },

    // ===== 技能使用(战斗中) =====
    useSkill: function(sid, target){
        var sk=this.SKILLS.filter(function(s){return s.id===sid;})[0];
        if(!sk) return false;
        if(this.s.scds[sid]>0){this.log(sk.name+"冷却中("+this.s.scds[sid]+"回合)");return false;}
        if(this.s.sp<sk.cost){this.log("灵力不足(需"+sk.cost+")");return false;}
        this.s.sp-=sk.cost;
        this.s.scds[sid]=sk.cdMax;
        if(sid==='fireball'){var d=Math.floor(this.s.ba*1.5);target.hp-=d;this.log("🔥火球术造成"+d+"伤害!");return true;}
        if(sid==='iceshard'){var d=Math.floor(this.s.ba*1.2);target.hp-=d;target.slowed=2;this.log("❄冰锥术造成"+d+"伤害,敌人减速2回合");return true;}
        if(sid==='thunder'){var d=Math.floor(this.s.ba*2.0);target.hp-=d;this.log("⚡雷霆一击暴击"+d+"伤害!");return true;}
        if(sid==='healskill'){var h=Math.floor(this.s.mhp*0.3);this.s.hp=Math.min(this.s.mhp,this.s.hp+h);this.log("🌿回春术恢复"+h+"生命");return true;}
        if(sid==='shield'){this.s.shld=1;this.log("🛡金刚罩护体,下回合免伤50%");return true;}
        if(sid==='poison'){var d=Math.floor(this.s.ba*0.8);target.hp-=d;target.poisoned=3;this.log("☠毒雾术造成"+d+"伤害,中毒3回合");return true;}
        if(sid==='soulstrike'){var d=Math.floor(this.s.ba*1.0);target.hp-=d;this.log("👁神识冲击穿透"+d+"伤害");return true;}
        if(sid==='meteor'){var d=Math.floor(this.s.ba*2.5);target.hp-=d;this.log("☄陨星坠毁灭打击"+d+"伤害!");return true;}
        return false;
    },

        if(this.s.pet){this.log("已有灵宠");return;}
        if(this.s.ss<200){this.log("灵石不足(需200)");return;}
        var t=G.PETS[Math.floor(Math.random()*G.PETS.length)];

        this.log("获得灵宠【"+t.name+"】");
        this.recalc();this.checkAch();this.refresh();

    feedPet: function(){
        if(!this.s.pet){this.log("没有灵宠");return;}
        if(this.s.ss<10){this.log("灵石不足");return;}
        this.s.ss-=10;this.s.pet.exp+=this.rng(8,15);
        if(this.s.pet.exp>=this.s.pet.lv*20&&!this.s.pet.evo&&this.s.pet.lv>=this.s.pet.evoLv){
            this.s.pet.evo=true;this.s.pet.nm=this.s.pet.evoName;
            this.s.pet.atk=this.s.pet.evoAtk;this.s.pet.def=this.s.pet.evoDef;this.s.pet.hp=this.s.pet.evoHp;
            this.log("灵宠进化！【"+this.s.pet.evoName+"】");this.checkAch();
        }else if(this.s.pet.exp>=this.s.pet.lv*20){
            this.s.pet.lv++;this.s.pet.exp=0;
            this.s.pet.atk+=2;this.s.pet.def+=1;this.s.pet.hp+=10;
            this.log("灵宠升级至Lv."+this.s.pet.lv);
        }
        this.recalc();this.refresh();
    },

    addEq: function(eq, fromInv){
        var s=this.s; fromInv=fromInv||false;
        var old=null;
        if(eq.t==='weapon'){
            old=s.eq.wp; s.eq.wp=eq;
            this.log("装备武器【"+eq.name+"】(攻+"+eq.atk+")");
        }else if(eq.t==='armor'){
            old=s.eq.ar; s.eq.ar=eq;
            this.log("装备防具【"+eq.name+"】(防+"+eq.def+",HP+"+eq.hp+")");
        }else{
            if(s.eq.rg.length>=2){this.log("饰品槽已满");return;}
            s.eq.rg.push(eq);
            this.log("装备饰品【"+eq.name+"】");
            old=null;
        }
        // 卸下的装备放回背包
        if(old){s.inv.push(old);this.log(old.name+"放回背包");}
        // 从背包移除（如果是背包中装备的）
        if(fromInv){
            var idx=s.inv.indexOf(eq);
            if(idx>=0) s.inv.splice(idx,1);
        }
        this.recalc();this.checkAch();this.refresh();
    },

    buyEq: function(eq){
        var pr=eq.pr+this.s.r*10;
        if(this.s.ss<pr){this.log("灵石不足");return;}
        this.s.ss-=pr;
        // 购买后放入背包
        var item={t:eq.t,name:eq.name,atk:eq.atk||0,def:eq.def||0,hp:eq.hp||0};
        this.s.inv.push(item);
        this.log("购买"+eq.name+"，已放入背包");
        this.refresh();
    },

    // ===== 功法系统 =====
    learnTech: function(tid){
        var tech=this.TECHNIQUES.filter(function(t){return t.id===tid;})[0];
        if(!tech) return;
        if(this.s.r<tech.req){this.log("需"+this.REALMS[tech.req].name+"方可修炼");return;}
        if(!this.s.techSkills) this.s.techSkills=[];
        if(this.s.techSkills.indexOf(tid)>=0 && this.s.tech&&this.s.tech.id===tid){this.log("已修炼此功法");return;}
        // 记录已获得
        if(this.s.techSkills.indexOf(tid)<0) this.s.techSkills.push(tid);
        // 切换功法
        var old=this.s.tech?this.s.tech.name:'无';
        this.s.tech={id:tech.id,name:tech.name,cv:tech.cv,atk:tech.atk,def:tech.def||0,hpMul:tech.hpMul||0,dunst:tech.dunst||0,ssense:tech.ssense||0};
        this.recalc();this.s.hp=this.s.mhp;
        var tiers={黄:'🟤',玄:'🟣',地:'🔵',天:'🟡'};
        this.log("修炼功法【"+(tiers[tech.tier]||'')+tech.name+'】('+tech.tier+'级'+(old!=='无'?'，替换'+old:'')+')');
        this.refresh();
    },
    // 获取功法（各系统调用，不自动装备）
    _acquireTech: function(tid){
        if(!this.s.techSkills) this.s.techSkills=[];
        // 数组参数：从池中选一个可用的
        if(Array.isArray(tid)){
            var eligible=[];
            for(var i=0;i<tid.length;i++){
                var t=this.TECHNIQUES.filter(function(x){return x.id===tid[i];})[0];
                if(t&&this.s.r>=t.req&&this.s.techSkills.indexOf(t.id)<0) eligible.push(t);
            }
            if(eligible.length===0) return false;
            var pick=eligible[Math.floor(Math.random()*eligible.length)];
            return this._acquireTech(pick.id);
        }
        // 单id
        if(this.s.techSkills.indexOf(tid)>=0) return false;
        var tech=this.TECHNIQUES.filter(function(t){return t.id===tid;})[0];
        if(!tech) return false;
        if(this.s.r<tech.req) return false;
        this.s.techSkills.push(tid);
        var tiers={黄:'🟤',玄:'🟣',地:'🔵',天:'🟡'};
        this.log("📖 获得功法【"+(tiers[tech.tier]||'')+tech.name+"】("+tech.tier+"级)，可在洞府切换");

    // ===== 突破丹药 =====
    craftPill: function(pid){

        if(this.s.hb<p.mat){this.log("需"+p.mat+"药材");return;}
        if(this.s.ss<p.cost){this.log("需"+p.cost+"灵石");return;}
        this.s.ss-=p.cost;this.s.hb-=p.mat;
        if(!this.s.pills) this.s.pills={};
        // 丹药品级：神识越高，出高品概率越大
        var sc=this.s.ssense||0;
        var r=Math.random()+sc*0.003;
        var grade=r>0.9?'极品':r>0.7?'上品':r>0.5?'中品':'下品';
        var mult={下品:0.5,中品:1.0,上品:1.3,极品:1.8};
        if(!this.s.pills[pid]) this.s.pills[pid]={};
        var gk=grade; // grade 本身已是"下品/中品/上品/极品"
        this.s.pills[pid][gk]=(this.s.pills[pid][gk]||0)+1;
        var eff=Math.floor(p.rwd*mult[grade]);
        this.log("炼制"+grade+p.name+"，突破率+"+eff+"%");

    usePill: function(pid,grade){
        var p=this.PILLS[pid];
        if(!p) return;
        if(!this.s.pills||!this.s.pills[pid]||!(this.s.pills[pid][grade]||0)){this.log("没有此丹药");return;}
        if(this.s.r+1!==p.realmLvl){this.log(p.name+"仅用于突破至"+this.REALMS[p.realmLvl].name);return;}
        if(!this.s.usedPillAt) this.s.usedPillAt={};
        if(this.s.usedPillAt[this.s.r]){this.log("本境界已服用过突破丹药，最多一粒");return;}
        var mult={下品:0.5,中品:1.0,上品:1.3,极品:1.8};
        var eff=Math.floor(p.rwd*mult[grade]);
        this.s.pills[pid][grade]--;
        if(this.s.pills[pid][grade]<=0) delete this.s.pills[pid][grade];
        this.s.bbrb=Math.min(100,this.s.bbrb+eff);
        this.s.usedPillAt[this.s.r]=true;
        this.log("服用"+grade+p.name+"，突破率+"+eff+"%");
        this.refresh();

    _monsterRetaliate: function(){

            if(this.s.pet) ed=Math.max(1,ed-(this.s.pet.evo?this.s.pet.evoDef:this.s.pet.def)*1.5);
            ed=Math.max(1,ed-this.s.df);
            this.s.hp=Math.max(0,this.s.hp-ed);
            if(this.s.hp<=0) this.hpDeath();
        }

    adv: function(db){

        var cost=db?15:8;
        if(this.s.sp<cost){this.log("灵力不足");return;}
        this.s.sp-=cost;var logs=[];
        for(var i=0;i<(db?2:1);i++){
            var r=Math.random();
            if(r<0.25&&!this.s.mas){
                var ms=["青云真人","酒剑仙","丹霞长老","剑圣白眉","药王孙思邈","阵皇诸葛玄"];
                this.s.mas=true;this.s.mname=ms[Math.floor(Math.random()*ms.length)];
                this.s.amb=4+this.s.r*3;this.recalc();
                logs.push("拜师【"+this.s.mname+"】");this.checkAch();
            }else if(r<0.48&&!this.s.sn){
                var st=["玄天宗","万剑门","碧落宫","丹霞谷","星辰阁","太虚观","天机府"];
                this.s.sn=st[Math.floor(Math.random()*st.length)];
                this.s.ss+=25+this.s.r*10;logs.push("加入"+this.s.sn);
            }else if(r<0.7){
                var ss=15+this.s.r*8;this.s.ss+=ss;
                this.s.cv=Math.min(this.s.cv+6+this.s.r*3,this.maxCv());
                if(this.ch(0.35)) this.s.hb++;logs.push("灵石+"+ss);
            }else if(r<0.88){
                this.s.ss+=20+this.s.r*10;logs.push("灵石+"+(20+this.s.r*10));
            }else{
                var l=this.rng(8,18);
                this.s.sp=Math.max(0,this.s.sp-l);
                this.s.hp=Math.max(0,this.s.hp-Math.floor(l*1.5));
                logs.push("遇险,灵力-"+l);if(this.s.hp<=0) this.hpDeath();
            }
            if(!this.s.par&&this.ch(0.18)) this.createPartner();
            if(!this.s.pet&&this.ch(0.1)){var pt=G.PETS[Math.floor(Math.random()*G.PETS.length)];this.s.pet={nm:pt.name,atk:pt.atk,def:pt.def,hp:pt.hp,lv:1,exp:0,evo:false,evoLv:pt.evoLv,evoName:pt.evoName,evoAtk:pt.evoAtk,evoDef:pt.evoDef,evoHp:pt.evoHp};logs.push("发现灵宠【"+pt.name+"】");}
        }
        if(logs.length) this.log("云游："+logs.join("；"));
        // 功法掉落（提高概率）
        if(this.ch(0.18)){
            if(this._acquireTech(this.techPools.wd)) this.log("📖 云游偶得功法！");
        }
        if(!db&&this.ch(0.3)) this.triggerEv('wd');
        // 遁速减少云游耗时
        var dunstBonus=this.s.dunst||0;
        this.recalc();if(!this.cy((db?0.8:0.5)*Math.max(0.6,1-dunstBonus*0.05))) return;
        this.updDaily('ad');this.refresh();
    },

    // ===== 秘境（分境界梯度，越级收益断崖式衰减） =====
    secExp: function(idx){
        if(this.chkEv()) return;
        var sr=this.SECRET_REALMS[idx];
        if(!sr){return;}
        if(this.s.sp<sr.cost){this.log("灵力不足(需"+sr.cost+")");return;}
        // 境界匹配度：高于秘境需求时收益急剧衰减
        var diff=this.s.r-sr.minR;
        var decay=diff<=0?1:Math.pow(0.15,diff); // 1级=15%, 2级=2.25%, 3级≈0.3%
        if(decay<0.01) decay=0;
        this.s.sp-=sr.cost;
        if(decay<=0){this.log(sr.name+"已无探索价值(境界差距过大)");this.cy(0.3);this.refresh();return;}
        var r=Math.random();
        if(r<0.2){this.triggerEv('sc');return;}
        else if(r<0.4){var ss=Math.floor(sr.ss*decay);this.s.ss+=ss;this.log(sr.name+"灵石+"+ss+(decay<1?'(衰减'+(decay*100).toFixed(0)+'%)':''));}
        else if(r<0.6){var cv=Math.floor(sr.cv*decay);this.s.cv=Math.min(this.s.cv+cv,this.maxCv());this.log(sr.name+"悟道+"+cv+(decay<1?'(衰减'+(decay*100).toFixed(0)+'%)':''));}
        else if(r<0.75&&decay>0.7){var e=this.EQUIPS[Math.floor(Math.random()*this.EQUIPS.length)];this.addEq({t:e.t,name:e.name,atk:e.atk||0,def:e.def||0,hp:e.hp||0});}
        else if(r<0.9&&decay>0.5){this.s.hb+=Math.floor(2*decay);this.log("药材+"+Math.floor(2*decay));}
        else{this.s.hp=Math.max(0,this.s.hp-30);this.rma(3);this.log("秘境遇险");if(this.s.hp<=0) this.hpDeath();}
        if(!this.s.par&&this.ch(0.18)) this.createPartner();
        // 功法掉落(神识越高越容易发现功法)
        var sc=this.s.ssense||0;
        if(this.ch(0.12+sc*0.005)){
            if(this._acquireTech(this.techPools.sc)) this.log("📖 秘境中发现功法！");
        }
        if(!this.cy(1.0)) return;
        this.refresh();
    },

        for(var i=0;i<d.fl-1;i++){
            this.s.dmons.push({name:d.name+"守卫"+(i+1),hp:40+this.s.r*20+i*15,atk:12+this.s.r*8+i*5,rwd:15+this.s.r*8+i*5});
        }
        this.s.dboss={name:d.boss,hp:d.bHp+this.s.r*30,atk:d.bAtk+this.s.r*10,rwd:d.rwd+this.s.r*20,isBoss:true};

    dgFight: function(){
        var s=this.s;
        if(s.di<0||(!s.dboss&&s.dmons.length===0)) return;
        if(s.sp<5){this.log("灵力不足");return;}
        s.sp-=5; this._tickSkillCDs(); this._tickCooldowns();
        var isB=s.dmons.length===0;
        var t=isB?s.dboss:s.dmons[0];
        var dmg=Math.floor(s.ba*(0.85+Math.random()*0.6));
        if(s.pet) dmg+=Math.floor((s.pet.evo?s.pet.evoAtk:s.pet.atk)*1.0);
        dmg=Math.max(1,dmg-Math.floor(t.atk*0.1));
        t.hp-=dmg;this.log("副本战：对"+t.name+"造成"+dmg+"伤害");
        if(t.hp<=0){
            s.ss+=t.rwd;this.log("击败"+t.name+"！灵石+"+t.rwd);
            if(isB){
                s.dc=(s.dc||0)+1;
                var dg=this.DUNGEONS[s.di];
                var diff=s.r-dg.realmLvl;
                var ddecay=diff<=0?1:Math.pow(0.2,diff);
                var bRwd=Math.floor((dg.rwd*2+s.r*30)*ddecay);
                var extra='灵石+'+bRwd+(ddecay<1?'(衰减'+(ddecay*100).toFixed(0)+'%)':'');
                var eq=this.EQUIPS[Math.floor(Math.random()*this.EQUIPS.length)];
                var item={t:eq.t,name:eq.name,atk:eq.atk||0,def:eq.def||0,hp:eq.hp||0};
                s.inv.push(item);extra+=', '+eq.name;
                s.hb+=Math.floor((2+this.rng(0,3))*ddecay);extra+=',药材+'+(2+this.rng(0,3));
                s.bbrb=Math.min(100,s.bbrb+Math.floor(3*ddecay));extra+=',突破率+'+(Math.floor(3*ddecay))+'%';
                s.lfb=(s.lfb||0)+Math.floor(2*ddecay);extra+=',寿元上限+'+Math.floor(2*ddecay);
                s.ss+=bRwd;
                if(ddecay>0.3&&this.ch(0.35*ddecay)){
                    if(this._acquireTech(this.techPools.dg)) extra+=', 📖功法';
                }
                this.log(dg.name+"通关！获得："+extra);
                this.recalc();this.checkAch();
                s.dboss=null;s.di=-1;
                this.recalc();this.refresh();
                return;
            }
            s.dmons.shift();s.dflr++;
            if(s.dmons.length===0) this.log("进入BOSS层："+s.dboss.name);
        }
        if((t.hp>0||!isB)&&s.di>=0){
            var ed=Math.floor(t.atk*(0.7+Math.random()*0.5));
            if(t.slowed>0){ed=Math.floor(ed*0.6);t.slowed--;}
            if(s.shld>0){ed=Math.floor(ed*0.5);s.shld--;}
            if(t.poisoned>0){t.hp-=Math.floor(s.ba*0.15);t.poisoned--;this.log("毒雾持续，"+t.name+"受到"+Math.floor(s.ba*0.15)+"伤害");}
            ed=Math.max(1,ed-s.df);
            s.hp=Math.max(0,s.hp-ed);
            if(t.hp<=0) this.log(t.name+"临死反击造成"+ed+"伤害");
            if(s.hp<=0) this.hpDeath();
        }
        this.recalc();this.refresh();
    },

        this.s.sp-=5; this._tickSkillCDs(); this._tickCooldowns();

        var dmg=Math.floor(this.s.ba*(0.8+Math.random()*0.7));
        if(this.s.pet) dmg+=Math.floor((this.s.pet.evo?this.s.pet.evoAtk:this.s.pet.atk)*0.8);

            if(!sil){this._toast('已保存');}
        }catch(e){
            console.warn('保存失败:',e);
            this._toast('保存失败：'+(e.message||'存储空间不足'));
        }
        this.refresh();
    },
    manualSave: function(){
        try{
            localStorage.setItem(this.SAVE_KEY,JSON.stringify(this.s));
            localStorage.setItem(this.MANUAL_KEY,JSON.stringify(this.s));
            this._toast('已保存（可读档回退）');
        }catch(e){
            console.warn('手动保存失败:',e);
            this._toast('保存失败：'+(e.message||'存储空间不足'));

    _toast: function(msg){
        var t=document.getElementById('toast');
        if(!t){return;}
        t.textContent=msg;
        t.classList.add('show');
        clearTimeout(this._toastTm);
        var self=this;
        this._toastTm=setTimeout(function(){t.classList.remove('show');},1500);
    },
    _autosave: null,
    startAutosave: function(){
        if(this._autosave){return;}
        var self=this;
        this._autosave=setInterval(function(){self.save(true);},30000);
        window.addEventListener('beforeunload',function(){self.save(true);});
        document.addEventListener('visibilitychange',function(){if(document.hidden){self.save(true);}});
    },
    load: function(){
        try{
            var raw=localStorage.getItem(this.SAVE_KEY);
            if(!raw){this.startNew();return false;}
            var ld=JSON.parse(raw);
            if(!ld||typeof ld!=='object'){this.startNew();return false;}
            var def=this.defState();
            for(var k in def){if(ld.hasOwnProperty(k))this.s[k]=ld[k];else this.s[k]=def[k];}
            // Fix numeric fields
            var nf=['r','sr','cv','sp','msp','hp','mhp','ba','df','ss','ag','mag','mrw','dflr','dc','di','bbr','bbrb','bpu','gu','ctr','hb','aw','ark','mk','ac','lfb','agr','ftl','ssense','dunst'];
            var self=this;
            nf.forEach(function(f){if(typeof self.s[f]!=='number'||!isFinite(self.s[f]))self.s[f]=def[f];});
            if(!Array.isArray(this.s.mons)||!this.s.mons.length) this.genMons();
            if(!Array.isArray(this.s.skls)) this.s.skls=[];
            if(typeof this.s.scds!=='object') this.s.scds={};
            if(!this.s.eq||typeof this.s.eq!=='object') this.s.eq={wp:null,ar:null,rg:[]};
            if(!Array.isArray(this.s.eq.rg)) this.s.eq.rg=[];
            if(!this.s.es||typeof this.s.es!=='object') this.s.es={hf:0,ar:0,sa:0,tr:0};
            if(typeof this.s.achs!=='object') this.s.achs={};
            if(!this.ROOTS[this.s.rt]) this.s.rt='five';
            if(!Array.isArray(this.s.inv)) this.s.inv=[];
            if(typeof this.s.hhc!=='number') this.s.hhc=0;
            if(typeof this.s.shld!=='number') this.s.shld=0;
            if(!this.s.pills||typeof this.s.pills!=='object') this.s.pills={};
            if(this.s.tech&&typeof this.s.tech!=='object') this.s.tech=null;
            if(!Array.isArray(this.s.techSkills)) this.s.techSkills=[];
            this.recalc();
            if(!isFinite(this.s.hp)||this.s.hp<=0) this.s.hp=this.s.mhp;
            if(this.s.hp>this.s.mhp) this.s.hp=this.s.mhp;
            return true;
        }catch(e){console.warn("存档加载失败:",e);localStorage.removeItem(this.SAVE_KEY);this.startNew();return false;}
    },

        var ac=s.gd==='male'?'male':'female';
        var eqinfo='';
        if(s.eq.wp) eqinfo+=' 🗡️'+s.eq.wp.name;
        if(s.eq.ar) eqinfo+=' 🛡️'+s.eq.ar.name;
        if(s.pet) eqinfo+=' 🐾'+s.pet.nm;
        var rt=this.ROOTS[s.rt];
        var h='<div class="scene-header-bar"><div class="avatar-box '+ac+'"></div><div style="font-size:0.75rem;"><b>'+s.pn+'</b> · '+this.REALMS[s.r].name+'<br><small style="color:'+(rt.mult>=1.5?'#ffd700':rt.mult>=1?'#c7b58a':'#7a6a8b')+';">'+rt.name+'('+rt.desc+')</small>'+(s.tech?'<small style="color:#80d0ff;"> | '+s.tech.name+'</small>':'')+'<br><small style="color:#b7a17c;">攻'+s.ba+' 防'+s.df+eqinfo+'</small></div></div>';

    _renderDg: function(){
        var p=document.getElementById('pnlDungeon'), s=this.s;
        if(s.di<0){
            p.innerHTML='<div style="text-align:center;font-size:0.8rem;">选择副本挑战</div>';
            var self=this;
            this.DUNGEONS.forEach(function(d,i){
                var locked=s.r<d.realmReq;
                var div=document.createElement('div');div.className='card';
                div.innerHTML='<span>'+d.name+' ('+d.fl+'层) '+(locked?'🔒':'')+'<br><small>灵石+'+d.rwd+' 灵力-'+d.cost+'</small></span><button class="btn '+(locked?'':'pr')+'" '+(locked?'disabled':'')+'>'+(locked?'需'+(self.REALMS[d.realmReq]?self.REALMS[d.realmReq].name:'')+'进入':'挑战')+'</button>';
                if(!locked) div.querySelector('button').addEventListener('click',function(){self.enterDg(i);});
                p.appendChild(div);
            });
        }else{
            var d=this.DUNGEONS[s.di];
            var isB=s.dmons.length===0;
            var t=isB?s.dboss:s.dmons[0];
            p.innerHTML=this._charHeader()+'<div class="dfl">'+d.name+' - 第'+s.dflr+'/'+d.fl+'层</div>';
            // Boss 插图
            if(isB){
                var bossCls='';
                var bn=t.name;
                if(bn.indexOf('魔')>=0||bn.indexOf('龙')>=0) bossCls='boss-dragon';
                else if(bn.indexOf('妖')>=0||bn.indexOf('狐')>=0) bossCls='boss-fox';
                else if(bn.indexOf('剑')>=0||bn.indexOf('灵')>=0||bn.indexOf('战')>=0) bossCls='boss-spirit';
                if(bossCls) p.innerHTML+='<div class="boss-img '+bossCls+'"></div>';
            }
            p.innerHTML+='<div class="card"><div><span class="'+(isB?'bname':'')+'">'+t.name+'</span><br><small>生命 '+t.hp+' | 攻击 '+t.atk+'</small></div><button class="btn dg" onclick="G.dgFight();G.save();">攻击(-5)</button></div>';
            // Skill buttons
            if(this.s.skls.length>0){
                var sh='<div class="skill-bar">';
                var sw=this;
                this.s.skls.forEach(function(sid){
                    var sk=sw.SKILLS.filter(function(s){return s.id===sid;})[0];
                    if(!sk) return;
                    var onCd=sw.s.scds[sid]>0;
                    sh+='<button class="btn bs'+(onCd?'" disabled':'')+'" onclick="G.dgSkillFight(\''+sid+'\');G.save();">'+sk.name+'('+sk.cost+'灵)'+(onCd?' CD'+sw.s.scds[sid]:'')+'</button>';
                });
                sh+='</div>';
                p.innerHTML+=sh;
            }
            p.innerHTML+='<button class="btn" onclick="G.dgQuit();">退出副本</button>';
        }
    },

    _buyEq: function(i){var e=this.EQUIPS[i];this.buyEq(e);this.save();this.render('market');},
    _buySkill: function(id,pr){
        if(this.s.ss<pr){this.log("灵石不足");return;}
        this.s.ss-=pr;this.learnSkill(id);this.save();this.render('market');
    },
    _rename: function(){
        var self=this;
        this.mod('<h3>修改道号</h3><input type="text" id="rnInput" value="'+this.s.pn+'" maxlength="8"><br><button class="btn pr" id="cfRnBtn">确定</button>');
        setTimeout(function(){
            var ni=document.getElementById('rnInput'),nb=document.getElementById('cfRnBtn');
            if(!ni||!nb) return;
            nb.addEventListener('click',function(){var n=ni.value.trim();if(n){self.s.pn=n;self.log("道号更改为【"+n+"】");}self.closeMod();self.refresh();self.save();});
        },50);
    },
    _renamePar: function(){
        if(!this.s.par) return;
        var self=this;
        this.mod('<h3>道侣改名</h3><input type="text" id="rpInput" value="'+this.s.par.nm+'" maxlength="8"><br><button class="btn pr" id="cfRpBtn">确定</button>');
        setTimeout(function(){
            var ni=document.getElementById('rpInput'),nb=document.getElementById('cfRpBtn');
            if(!ni||!nb) return;
            nb.addEventListener('click',function(){var n=ni.value.trim();if(n){self.s.par.nm=n;self.log("道侣更名为【"+n+"】");}self.closeMod();self.refresh();self.save();});
        },50);
    },
    // ===== 功法选择弹窗 =====
    _showTech: function(){
        var h='<h3>选择功法</h3>', self=this;
        var cur=this.s.tech;
        var skls=this.s.techSkills||[];
        if(cur) h+='<div style="font-size:0.7rem;color:#ffd78b;margin:0.3rem;">当前：'+cur.name+(cur.cv?' 修+'+(cur.cv*100).toFixed(0)+'%':'')+(cur.atk?' 攻+'+(cur.atk*100-100).toFixed(0)+'%':'')+(cur.def?' 防+'+(cur.def*100).toFixed(0)+'%':'')+(cur.dunst?' 遁速+'+(cur.dunst*100).toFixed(0)+'%':'')+(cur.ssense?' 神识+'+(cur.ssense*100).toFixed(0)+'%':'')+'</div>';
        var tiers={黄:'🟤',玄:'🟣',地:'🔵',天:'🟡'};
        var hasAny=false;
        this.TECHNIQUES.forEach(function(t){
            if(skls.indexOf(t.id)<0) return; hasAny=true;
            var has=t.id===self.s.tech?.id;
            var tc=tiers[t.tier]||'';
            h+='<div class="card" style="'+(has?'border-color:#ffd700;':'')+'"><span><b>'+tc+t.name+'</b> <small>('+t.tier+'级)</small><br><small>'+(t.cv?'修+'+(t.cv*100).toFixed(0)+'% ':'')+(t.atk?'攻+'+(t.atk*100-100).toFixed(0)+'% ':'')+(t.def?'防+'+(t.def*100).toFixed(0)+'% ':'')+(t.dunst?'遁+'+(t.dunst*100).toFixed(0)+'% ':'')+(t.ssense?'神+'+(t.ssense*100).toFixed(0)+'%':'')+'</small></span>'+(has?'✅':''+(t.req>self.s.r?'🔒':'')+'<button class="btn bs pr" onclick="G.learnTech(\''+t.id+'\');G.save();G.closeMod();G.refresh();">切换</button>')+'</div>';
        });
        if(!hasAny) h+='<div style="font-size:0.7rem;color:#888;">暂无功法，通过副本/秘境/云游/竞技获取</div>';
        h+='<button class="btn bs" onclick="G.closeMod();">关闭</button>';
        this.mod(h);
    },
    // ===== 丹药服用弹窗 =====
    _showPills: function(){
        var h='<h3>突破丹药(每境界限一粒)</h3>', self=this;
        var hasAny=false;
        this.PILLS.forEach(function(p,i){
            var inv=self.s.pills?.[i]||{};
            Object.keys(inv).forEach(function(gk){
                var cnt=inv[gk];
                if(cnt>0){
                    hasAny=true;
                    var mult={下品:0.5,中品:1.0,上品:1.3,极品:1.8};
                    var eff=Math.floor(p.rwd*mult[gk]);
                    h+='<div class="card"><span>'+gk+p.name+' x'+cnt+' <small>(突破率+'+eff+'%)</small></span><button class="btn bs pr" onclick="G.usePill('+i+',\''+gk+'\');G.save();G.closeMod();G.refresh();">服用</button></div>';
                }
            });
        });
        if(!hasAny) h+='<div style="font-size:0.7rem;color:#888;">无丹药库存，前往仙府炼制</div>';
        h+='<button class="btn bs" onclick="G.closeMod();">关闭</button>';
        this.mod(h);
    },
    _showEq: function(){
        var eq=this.s.eq,p=eq.rg||[], inv=this.s.inv||[], self=this;
        var h='<h3>装备管理</h3>';
        h+='<div style="font-size:0.75rem;margin:0.3rem 0;color:#ffd78b;">已装备：</div>';
        h+='<div class="card"><span>武器：'+(eq.wp?eq.wp.name+' (攻+'+eq.wp.atk+')':'无')+'</span>'+(eq.wp?'<button class="btn bs dg" id="_uw">卸下</button>':'')+'</div>';
        h+='<div class="card"><span>防具：'+(eq.ar?eq.ar.name+' (防+'+eq.ar.def+',HP+'+eq.ar.hp+')':'无')+'</span>'+(eq.ar?'<button class="btn bs dg" id="_ua">卸下</button>':'')+'</div>';
        h+='<div class="card"><span>饰品('+p.length+'/2)：'+(p.length>0?p.map(function(a,i){return a.name+'<button class="btn bs dg" style="margin-left:4px;" id="_ur'+i+'">卸</button>';}).join(', '):'无')+'</span></div>';
        h+='<div style="font-size:0.75rem;margin:0.4rem 0;color:#ffd78b;">背包 ('+inv.length+'件)：</div>';
        if(inv.length===0) h+='<div style="font-size:0.65rem;color:#888;">背包为空</div>';
        else {
            // 去重：同类同名装备合并显示数量
            var grouped={};
            inv.forEach(function(item,i){
                var key=item.name+'_'+item.t;
                if(!grouped[key]) grouped[key]={item:item,indices:[]};
                grouped[key].indices.push(i);
            });
            Object.keys(grouped).forEach(function(k){
                var g=grouped[k], item=g.item, cnt=g.indices.length, idx=g.indices[0];
                h+='<div class="card"><span>'+item.name+(cnt>1?' x'+cnt:'')+' '+(item.t==='weapon'?'(攻+'+item.atk+')':item.t==='armor'?'(防+'+item.def+',HP+'+item.hp+')':'(攻+'+item.atk+',HP+'+item.hp+')')+'</span><button class="btn bs pr" id="_eq'+idx+'">装备</button></div>';
            });
        }
        h+='<br><button class="btn bs" id="_ce">关闭</button>';
        this.mod(h);
        var self2=this;
        setTimeout(function(){
            if(eq.wp) document.getElementById('_uw')?.addEventListener('click',function(){
                self2.s.inv.push(eq.wp);eq.wp=null;self2.recalc();self2.refresh();self2.closeMod();self2._showEq();
            });
            if(eq.ar) document.getElementById('_ua')?.addEventListener('click',function(){
                self2.s.inv.push(eq.ar);eq.ar=null;self2.recalc();self2.refresh();self2.closeMod();self2._showEq();
            });
            p.forEach(function(_,i){document.getElementById('_ur'+i)?.addEventListener('click',function(){
                self2.s.inv.push(p[i]);p.splice(i,1);self2.recalc();self2.refresh();self2.closeMod();self2._showEq();
            });});
            inv.forEach(function(item,i){document.getElementById('_eq'+i)?.addEventListener('click',function(){
                self2.addEq(item,true);self2.closeMod();self2.refresh();self2.save();self2._showEq();
            });});
            document.getElementById('_ce')?.addEventListener('click',function(){self2.closeMod();});
        },50);
    },

    showAch: function(){
        var h='<h3>成就 ('+Object.keys(this.s.achs).length+'/'+this.ACHS.length+')</h3>';
        var self=this;
        this.ACHS.forEach(function(a){
            var ul=self.s.achs[a.id];
            h+='<div class="ach-card'+(ul?'':' locked')+'"><span>'+(ul?'✅':'🔒')+' '+a.name+'</span><small>'+a.desc+'</small></div>';
        });
        h+='<button class="btn bs" id="_ca">关闭</button>';
        this.mod(h);
        var self2=this;
        setTimeout(function(){var b=document.getElementById('_ca');if(b) b.addEventListener('click',function(){self2.closeMod();});},50);
    },
    showDaily: function(){
        this.checkDaily();
        var h='<h3>日常任务</h3>', self=this;
        Object.keys(this.s.dts).forEach(function(k){
            var t=self.s.dts[k];
            h+='<div style="font-size:0.72rem;padding:0.3rem;">'+t.desc+' ('+t.prog+'/'+t.need+') '+(t.done?'✅':'⏳')+' 奖励:'+t.rwd+'灵石</div>';
        });
        h+='<button class="btn bs" id="_cd">关闭</button>';
        this.mod(h);
        setTimeout(function(){var b=document.getElementById('_cd');if(b) b.addEventListener('click',function(){self.closeMod();});},50);
    },

    // ===== UI刷新 =====
    refresh: function(){
        var s=this.s;
        var rn=this.REALMS[s.r].name+'·'+['前期','中期','后期'][s.sr];
        var ageStr=s.r>=6?'∞':Math.floor(s.ag)+'/'+(isFinite(s.mag)?s.mag:'∞');
        var sub=s.sr<2?this.subCost():'渡劫';
        document.getElementById('realm').textContent=rn+' | '+this.ROOTS[s.rt].name;
        document.getElementById('pname').textContent=s.pn+' · 修仙'+Math.floor(s.ag-20)+'载';
        var h='';
        h+='<div class="si">灵力 <span>'+Math.floor(s.sp)+'</span>/<span>'+s.msp+'</span></div>';
        h+='<div class="si">生命 <span>'+Math.floor(s.hp)+'</span>/<span>'+s.mhp+'</span></div>';
        h+='<div class="si">灵石 <span>'+s.ss+'</span></div>';
        h+='<div class="si">攻 <span>'+s.ba+'</span> | 防 <span>'+s.df+'</span></div>';
        h+='<div class="si">寿元 <span>'+ageStr+'</span>'+(s.r===6?' 飞升倒计时:'+Math.floor(s.ftl):'')+'</div>';
        h+='<div class="si">神识 <span>'+(s.ssense||0)+'</span> | 遁速 <span>'+(s.dunst||0)+'</span></div>';
        h+='<div class="si">突破率 <span>'+this.brRate()+'%</span> | 药材 <span>'+s.hb+'</span></div>';
        var pct=Math.min(100,(s.cv/this.maxCv())*100);
        h+='<div class="sbar"><span class="sbl">修为</span><div class="sbf"><div class="sbi" style="width:'+pct+'%"></div></div><span class="sbt">'+s.cv+'/'+this.maxCv()+'</span></div>';
        document.getElementById('stats').innerHTML=h;
        document.getElementById('logbox').innerHTML=s.logs.slice(-7).map(function(m){return '> '+m;}).join('<br>');
        // 同步刷新当前场景面板内容
        this._tickCooldowns();
        try{this.render(this.curScene);}catch(e){}
    },
    // 兼容旧调用
    refreshAndRender: function(){this.refresh();},

    // ===== 初始化 =====
    init: function(){
        try{
            this.s=this.defState();
            var loaded=this.load();
            if(!loaded){
                // startNewGame shows modal, rest will be handled after user input
                this.switchScene('cave');
            }else{
                this.log("读档成功");
                this.refresh();
                this.switchScene('cave');
                this.checkDaily();
            }
            this.startAutosave();
        }catch(e){
            console.error("初始化失败:",e);
            try{localStorage.removeItem(this.SAVE_KEY);}catch(x){}
            this.startNew();
            this.switchScene('cave');
        }
    }
};

// Run
window.addEventListener('DOMContentLoaded',function(){
    var ROOTS=G.ROOTS;
    G.init();
});
</script>
</body>
</html>
